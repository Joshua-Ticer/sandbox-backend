services:
  api:
    build: .
    ports:
      - "3000:8000"
    env_file:
      .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    env_file:
      .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    env_file:
      .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: