name: Sandbox Pipeline

on: 
  push:
    branches:
      - main
      - workflow
  pull_request:
    branches:
      - main

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Hello World
        run: echo "Hello World"
  
  style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black pylint httpx
      
      - name: Checking code formatting with Black
        run: | 
          black --check .

      - name: Analysing the code with pylint
        run: |
          pylint $(git ls-files '*.py') --fail-under=9.0
  
  build:
    runs-on: ubuntu-latest
    needs: [style, unit-test]
    environment: Test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx

    - name: Debug env
      run: |
        echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD}}"
        env | grep POSTGRES || true

    - name: Start services
      env:
        POSTGRES_USER: ${{secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        REDIS_URL: ${{ secrets.REDIS_URL }}
      run: docker compose up -d --build

    - name: Wait for Postgres
      run: |
        sleep 3

    - name: Check container
      run: docker ps -a
    
    - name: Check logs
      run: docker compose logs postgres

    - name: List images
      run: docker images
    

  unit-test:
    runs-on: ubuntu-latest
    needs: style

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: sqlite:///./test.db
      ENV: test
      REDIS_URL: redis://localhost:6379/0

    steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.10"
            cache: 'pip'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest httpx

        - name: Run tests
          run: pytest -v
  

  integration-test:

    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Start services
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          docker compose up -d --build

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -f http://localhost:3000/health/ && exit 0
            sleep 2
          done

          echo "=== CONTAINERS ==="
          docker ps -a

          echo "=== LOGS ==="
          docker compose logs

          exit 1

      - name: Run integration tests
        run: |
          pytest tests/integration -v

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs

      - name: Shutdown services
        if: always()
        run: |
          docker compose down